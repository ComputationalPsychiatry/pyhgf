exclude: |
    (?x)^(
        docs/.*|
    )$

repos:
-   repo: https://github.com/PyCQA/docformatter
    rev: v1.7.8
    hooks:
      - id: docformatter
        args:
          - --in-place
          - --wrap-summaries=88
          - --wrap-descriptions=88
          - --black                     # quote/blankline conventions match ruff-format
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.20
  hooks:
    # Run the linter.
    - id: ruff
      args: ["--fix", "--extend-select=I"]  # Ensure isort rules are active
      additional_dependencies: ["nbformat"]  # Needed to handle .ipynb
    # Run the formatter.
    - id: ruff-format
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v2.2.0'
    hooks:
    - id: mypy 
      files: ^pyhgf/
      args: [--ignore-missing-imports]